    "app_packages/PySide6/Qt/qml",
    "app_packages/PySide6/Qt/translations",
    "app_packages/PySide6/Qt/metatypes",
    "app_packages/PySide6/Qt/libexec",
    "app_packages/PySide6/Qt/lib/QtQml.framework",
    "app_packages/PySide6/Qt/lib/QtQuick.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2Basic.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2BasicStyleImpl.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2Fusion.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2FusionStyleImpl.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2Imagine.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2IOSStyleImpl.framework",
    "app_packages/PySide6/Qt/lib/QtQuickControls2Impl.framework",
