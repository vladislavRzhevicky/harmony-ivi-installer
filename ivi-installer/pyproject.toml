# Apple Silicon as the primary target; universal_build above also pulls
# x86_64 wheels so the same .app runs on Intel Macs.

# Both macOS .app and Windows MSI ship platform-tools inside the
# wheel; see [tool.hatch.build.targets.wheel.force-include] above and
# ivi_installer/adb.py:_bundled_adb. Linux still downloads on first
# launch via ensure_adb().

[tool.briefcase.app.ivi_installer.windows]
requires = [
    "PySide6-Essentials>=6.7",
    "certifi>=2024.2.2",
]
# Build on Windows only:
#   pip install briefcase
#   briefcase create  windows
#   briefcase build   windows
#   briefcase package windows --adhoc-sign      # → dist/IVI Installer-0.1.0.msi
